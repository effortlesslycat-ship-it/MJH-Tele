<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teleprompter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function Teleprompter() {
      const [isEditing, setIsEditing] = useState(true);
      const [scriptText, setScriptText] = useState("Paste your script here...\n\nHit Enter twice to create a new segment.");
      const [fontSize, setFontSize] = useState(64);
      const [speed, setSpeed] = useState(2);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isMirrored, setIsMirrored] = useState(false);

      const speedRef = useRef(speed);
      const isPlayingRef = useRef(isPlaying);
      const positionYRef = useRef(0);
      
      const textContainerRef = useRef(null);
      const animationRef = useRef(null);

      useEffect(() => { speedRef.current = speed; }, [speed]);
      useEffect(() => { isPlayingRef.current = isPlaying; }, [isPlaying]);

      const jumpSegment = (direction) => {
        if (!textContainerRef.current) return;
        const segments = Array.from(textContainerRef.current.querySelectorAll('.script-segment'));
        if (segments.length === 0) return;
        
        const currentY = positionYRef.current;
        let currentIndex = segments.findIndex(seg => seg.offsetTop >= currentY - 50);
        if (currentIndex === -1) currentIndex = segments.length - 1;
        
        let targetIndex = direction === 'next' ? currentIndex + 1 : currentIndex - 1;
        if (targetIndex < 0) targetIndex = 0;
        if (targetIndex >= segments.length) targetIndex = segments.length - 1;
        
        positionYRef.current = segments[targetIndex].offsetTop - 50; // Added a slight offset so the word isn't cut off
      };

      // --- Expanded Keyboard & Remote Listener ---
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (isEditing) return;
          
          // Play/Pause: Spacebar or Enter
          if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); setIsPlaying((prev) => !prev); }
          
          // Speed Up: Arrow Up or Page Up
          if (e.code === 'ArrowUp' || e.code === 'PageUp') { e.preventDefault(); setSpeed((prev) => Math.min(prev + 0.5, 10)); }
          
          // Slow Down: Arrow Down or Page Down
          if (e.code === 'ArrowDown' || e.code === 'PageDown') { e.preventDefault(); setSpeed((prev) => Math.max(prev - 0.5, 0.5)); }
          
          // Jump Segments: Arrow Left or Arrow Right
          if (e.code === 'ArrowLeft') { e.preventDefault(); jumpSegment('prev'); }
          if (e.code === 'ArrowRight') { e.preventDefault(); jumpSegment('next'); }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [isEditing]);

      const animate = () => {
        if (isPlayingRef.current && textContainerRef.current) {
          positionYRef.current += speedRef.current;
          textContainerRef.current.style.transform = `translateY(-${positionYRef.current}px)`;
        }
        animationRef.current = requestAnimationFrame(animate);
      };

      useEffect(() => {
        if (!isEditing) {
          animationRef.current = requestAnimationFrame(animate);
        }
        return () => cancelAnimationFrame(animationRef.current);
      }, [isEditing]);

      if (isEditing) {
        return (
          <div className="flex flex-col h-screen bg-gray-100 p-8">
            <h1 className="text-2xl font-bold mb-4 text-black">Script Editor</h1>
            <textarea
              className="flex-1 p-4 text-lg border-2 border-gray-300 rounded text-black font-sans"
              value={scriptText}
              onChange={(e) => setScriptText(e.target.value)}
            />
            <button 
              onClick={() => { positionYRef.current = 0; setIsEditing(false); }}
              className="mt-4 p-4 bg-blue-600 text-white font-bold rounded text-xl"
            >
              Start Prompter
            </button>
          </div>
        );
      }

      return (
        <div className="flex flex-col h-screen bg-black text-white relative">
          
          <div className="flex-1 overflow-hidden relative" style={{ transform: isMirrored ? 'scaleX(-1)' : 'none' }}>
            <div ref={textContainerRef} className="absolute w-full px-12 text-center">
              
              {/* Buffer added here: Half a screen of blank space at the top */}
              <div className="h-[50vh]"></div>

              {scriptText.split('\n\n').map((segment, index) => (
                <p key={index} className="script-segment mb-24 font-sans" style={{ fontSize: `${fontSize}px`, lineHeight: '1.4' }}>
                  {segment}
                </p>
              ))}
